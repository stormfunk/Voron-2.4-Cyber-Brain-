[gcode_macro PRINT_START]
gcode:
  # =============================================================================
  # TUNING VARIABLES
  # =============================================================================
  {% set preheat_hotend_temp = 150 %}        # Hotend temp for QGL/meshing/touch (prevents oozing)
  {% set safe_z_height = 15 %}               # Z height for safe moves (mm)
  {% set movement_speed = 18000 %}           # XY movement speed (mm/min)

  # Cartographer Touch Settings
  # (now configured in [cartographer touch] section of printer.cfg)

  {% set cooling_fan_speed = 255 %}          # Part cooling fan speed for hotend cooling (0-255)

  # =============================================================================
  # PARSE SLICER PARAMETERS
  # =============================================================================
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

  # =============================================================================
  # PRINT START SEQUENCE
  # =============================================================================

  # Clear previous print state
  CLEAR_PAUSE
  SET_GCODE_OFFSET Z=0

  # Start bed heating immediately (longest wait)
  SET_DISPLAY_TEXT MSG="Heating bed: {target_bed}C"
  M140 S{target_bed}
  LIGHTS_HEATING

  # Home all axes
  SET_DISPLAY_TEXT MSG="Homing..."
  G28
  G90
  BED_MESH_CLEAR

  # Cool hotend if too hot (prevents oozing during QGL/mesh)
  {% if printer.extruder.temperature > preheat_hotend_temp %}
    SET_DISPLAY_TEXT MSG="Cooling hotend to {preheat_hotend_temp}C"
    M104 S{preheat_hotend_temp}
    M106 S{cooling_fan_speed}
    M109 S{preheat_hotend_temp}
    M107
  {% endif %}

  # Pre-heat hotend for QGL
  M104 S{preheat_hotend_temp}

  # Park at center and wait for temps
  G1 X{x_wait} Y{y_wait} Z{safe_z_height} F{movement_speed}
  SET_DISPLAY_TEXT MSG="Waiting for bed and hotend..."
  M190 S{target_bed}
  M109 S{preheat_hotend_temp}

  # Quad gantry level
  SET_DISPLAY_TEXT MSG="Quad gantry leveling..."
  QUAD_GANTRY_LEVEL
  G28 Z

  # Adaptive bed mesh
  SET_DISPLAY_TEXT MSG="Bed mesh calibration..."
  BED_MESH_CALIBRATE ADAPTIVE=1

  # Clean nozzle right before touch (retract to stop ooze, prime after)
  SET_DISPLAY_TEXT MSG="Cleaning nozzle..."
  CLEAN_NOZZLE PASSES=2 RETRACT=true PRIME=true DWELL=500

  # Cartographer touch home (nozzle at 150C, below max_touch_temperature)
  SET_DISPLAY_TEXT MSG="Touch calibration..."
  G1 X{x_wait} Y{y_wait} Z{safe_z_height} F{movement_speed}
  M107
  CARTOGRAPHER_TOUCH_HOME

  # Apply per-plate Z offset from slicer
  SET_GCODE_OFFSET Z={params.Z_OFFSET|default(0)|float}

  # Heat to final print temperature
  SET_DISPLAY_TEXT MSG="Heating to {target_extruder}C..."
  M109 S{target_extruder}

  # Full white for purge and first layer monitoring
  LIGHTS_ON

  # Purge nozzle
  SET_DISPLAY_TEXT MSG="Purging..."
  G90
  LINE_PURGE

  # Ready to print
  SET_DISPLAY_TEXT MSG="Printing!"
  _LIGHTS_START_LAYER_MONITOR
