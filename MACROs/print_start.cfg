[gcode_macro PRINT_START]
gcode:
  # =============================================================================
  # TUNING VARIABLES
  # =============================================================================
  {% set quick_start_toggle = true %}        # Quick start toggle: skip recalibration if printer is still calibrated from previous print
  {% set preheat_hotend_temp = 150 %}        # Hotend temp for QGL/meshing/touch (prevents oozing)
  {% set safe_z_height = 15 %}               # Z height for safe moves (mm)
  {% set movement_speed = 18000 %}           # XY movement speed (mm/min)
  {% set touch_retries = 7 %}                # Cartographer touch probe retries
  {% set touch_tolerance = 0.020 %}          # Cartographer touch probe tolerance (mm)
  {% set touch_retract_speed = 35 %}         # Cartographer retract speed (mm/s)
  {% set touch_approach_speed = 7 %}         # Cartographer approach speed (mm/s)
  {% set touch_acceleration = 500 %}         # Cartographer acceleration (mm/s^2)
  {% set touch_samples = 3 %}                # Cartographer samples per probe
  {% set cooling_fan_speed = 255 %}          # Part cooling fan speed for hotend cooling (0-255)

  # =============================================================================
  # PARSE SLICER PARAMETERS
  # =============================================================================
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

  # =============================================================================
  # QUICK START GUARD
  # =============================================================================
  # Quick start only valid if all calibration state is intact.
  {% set is_homed = "xyz" in printer.toolhead.homed_axes %}
  {% set qgl_applied = printer.quad_gantry_level.applied %}
  {% set can_quick_start = quick_start_toggle and is_homed and qgl_applied %}

  CLEAR_PAUSE
  SET_GCODE_OFFSET Z=0

  {% if can_quick_start %}

    # =============================================================================
    # QUICK START PATH (skip homing, QGL, mesh, touch)
    # =============================================================================
    SET_DISPLAY_TEXT MSG="Quick start: heating to {target_bed}C / {target_extruder}C"
    LIGHTS_HEATING
    M140 S{target_bed}
    M104 S{target_extruder}

    # Park while temps come up
    G90
    G1 X{x_wait} Y{y_wait} Z{safe_z_height} F{movement_speed}
    M190 S{target_bed}
    M109 S{target_extruder}

    # Light clean at print temp to handle any ooze accumulated since last print
    SET_DISPLAY_TEXT MSG="Cleaning nozzle..."
    CLEAN_NOZZLE PASSES=2 RETRACT=true PRIME=true DWELL=500

    # Apply per-plate Z offset from slicer
    SET_GCODE_OFFSET Z={params.Z_OFFSET|default(0)|float}

  {% else %}

    {% if quick_start_toggle %}
      RESPOND TYPE=echo MSG="Quick start requested but state invalid (homed={is_homed}, qgl={qgl_applied}) - running full sequence"
    {% endif %}

    # =============================================================================
    # FULL PRINT START SEQUENCE
    # =============================================================================

    # Start bed heating immediately (longest wait)
    SET_DISPLAY_TEXT MSG="Heating bed: {target_bed}C"
    M140 S{target_bed}
    LIGHTS_HEATING

    # Home all axes
    SET_DISPLAY_TEXT MSG="Homing..."
    G28
    G90
    BED_MESH_CLEAR

    # Cool hotend if too hot (prevents oozing during QGL/mesh)
    {% if printer.extruder.temperature > preheat_hotend_temp %}
      SET_DISPLAY_TEXT MSG="Cooling hotend to {preheat_hotend_temp}C"
      M104 S{preheat_hotend_temp}
      M106 S{cooling_fan_speed}
      M109 S{preheat_hotend_temp}
      M107
    {% endif %}

    # Pre-heat hotend for QGL
    M104 S{preheat_hotend_temp}

    # Park at center and wait for temps
    G1 X{x_wait} Y{y_wait} Z{safe_z_height} F{movement_speed}
    SET_DISPLAY_TEXT MSG="Waiting for bed and hotend..."
    M190 S{target_bed}
    M109 S{preheat_hotend_temp}

    # Quad gantry level
    SET_DISPLAY_TEXT MSG="Quad gantry leveling..."
    QUAD_GANTRY_LEVEL
    G28 Z

    # Adaptive bed mesh
    SET_DISPLAY_TEXT MSG="Bed mesh calibration..."
    BED_MESH_CALIBRATE ADAPTIVE=1

    # Clean nozzle right before touch.
    # No RETRACT/PRIME here: hotend is at preheat (150C) which is below
    # Klipper's min_extrude_temp (170C), so extrude moves would fail.
    SET_DISPLAY_TEXT MSG="Cleaning nozzle..."
    CLEAN_NOZZLE PASSES=2 RETRACT=false PRIME=false DWELL=500

    # Cartographer touch home (nozzle at 150C, below max_touch_temperature)
    SET_DISPLAY_TEXT MSG="Touch calibration..."
    G1 X{x_wait} Y{y_wait} Z{safe_z_height} F{movement_speed}
    M107
    CARTOGRAPHER_TOUCH_HOME

    # Apply per-plate Z offset from slicer
    SET_GCODE_OFFSET Z={params.Z_OFFSET|default(0)|float}

    # Heat to final print temperature
    SET_DISPLAY_TEXT MSG="Heating to {target_extruder}C..."
    M109 S{target_extruder}

  {% endif %}

  # =============================================================================
  # COMMON FINAL STEPS (purge + ready)
  # =============================================================================

  # Full white for purge and first layer monitoring
  LIGHTS_ON

  # Purge nozzle
  SET_DISPLAY_TEXT MSG="Purging..."
  G90
  LINE_PURGE

  # Retract to stop ooze on travel to skirt
  M83
  G1 E-1.5 F2400
  G92 E0
  M82

  # Ready to print
  SET_DISPLAY_TEXT MSG="Printing!"
  _LIGHTS_START_LAYER_MONITOR
