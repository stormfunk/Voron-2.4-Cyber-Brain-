#####################################################################
#   FILAMENT MANAGEMENT MACROS
#####################################################################

[gcode_macro LOAD_FILAMENT]
description: Load filament with heating and purge
gcode:
    {% set TEMP = params.TEMP|default(230)|int %}
    SAVE_GCODE_STATE NAME=LOAD_FILAMENT_STATE
    
    SET_DISPLAY_TEXT MSG="Loading filament..."
    LIGHTS_HEATING
    M117 Loading filament...
    
    # Move to center if not homed
    _CG28
    G90
    G1 X175 Y175 Z50 F6000
    
    # Heat up hotend
    SET_DISPLAY_TEXT MSG="Heating to {TEMP}°C"
    M109 S{TEMP}
    
    # Load filament
    SET_DISPLAY_TEXT MSG="Loading..."
    LIGHTS_PRINTING
    G91
    G1 E15 F300          # Load filament into extruder
    G1 E15 F150          # Slower load into hotend
    G1 E10 F50           # Very slow to get into melt zone
    
    # Purge and check
    SET_DISPLAY_TEXT MSG="Purging..."
    G1 E5 F150           # Small purge to ensure good flow
    
    G90
    LIGHTS_IDLE
    SET_DISPLAY_TEXT MSG="Load complete!"
    M117 Load complete - check extrusion
    RESTORE_GCODE_STATE NAME=LOAD_FILAMENT_STATE

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament with heating and retraction
gcode:
    {% set TEMP = params.TEMP|default(230)|int %}
    SAVE_GCODE_STATE NAME=UNLOAD_FILAMENT_STATE
    
    SET_DISPLAY_TEXT MSG="Unloading filament..."
    LIGHTS_HEATING
    M117 Unloading filament...
    
    # Move to center if not homed
    _CG28
    G90
    G1 X175 Y175 Z50 F6000
    
    # Heat up hotend
    SET_DISPLAY_TEXT MSG="Heating to {TEMP}°C"
    M109 S{TEMP}
    
    # Unload sequence
    SET_DISPLAY_TEXT MSG="Unloading..."
    LIGHTS_COOLING
    G91
    G1 E5 F150           # Small extrude to ensure melted
    G1 E-10 F300         # Quick retract to break string
    G1 E-30 F1000        # Fast unload from hotend
    G1 E-15 F1000        # Continue unload
    
    G90
    M104 S0              # Turn off hotend
    LIGHTS_OFF
    SET_DISPLAY_TEXT MSG="Unload complete!"
    M117 Unload complete - remove filament
    RESTORE_GCODE_STATE NAME=UNLOAD_FILAMENT_STATE

#####################################################################
#   PRINT CONTROL MACROS
#####################################################################

[gcode_macro M600]
description: Filament change macro (pause and position for manual change)
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-5 F2700         # Retract filament
    G1 Z{Z}              # Lift nozzle
    G90
    G1 X{X} Y{Y} F3000   # Move to change position
    M117 Change filament and resume
    SET_DISPLAY_TEXT MSG="Change filament & resume"

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
    # Parameters
    {% set x = params.X|default(35) %}      # edit to your preferred park position
    {% set y = params.Y|default(350) %}       # edit to your preferred park position
    {% set z = params.Z|default(10)|float %} # edit to your preferred park position
    {% set e = params.E|default(5)|float %}  # edit to your preferred retract length
    
    # Save current state
    SAVE_GCODE_STATE NAME=PAUSE_state
    PAUSE_BASE
    G91
    G1 E-{e} F2100        # Retract
    G1 Z{z}               # Lift nozzle
    G90
    G1 X{x} Y{y} F6000    # Move to park position
    SET_DISPLAY_TEXT MSG="Having a smoko"

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
    # Parameters
    {% set e = params.E|default(5)|float %} # edit to your preferred retract length
    
    G91
    G1 E{e} F2100         # Unretract
    RESTORE_GCODE_STATE NAME=PAUSE_state
    RESUME_BASE
    SET_DISPLAY_TEXT MSG="Print resumed"

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
    SET_DISPLAY_TEXT MSG="Print cancelled"
    TURN_OFF_HEATERS
    CANCEL_PRINT_BASE
    G91
    G1 E-5 F300           # Retract
    G90
    LIGHTS_IDLE                              # Back to dim white (not green)
    PRINT_END             # Call your existing print end macro

#####################################################################
#   HEATING & CHAMBER MACROS
#####################################################################

[gcode_macro HEAT_SOAK]
description: Heat bed and chamber for high-temp materials
gcode:
    {% set BED_TEMP = params.BED|default(110)|int %}
    {% set CHAMBER_TEMP = params.CHAMBER|default(45)|int %}
    {% set MINUTES = params.MINUTES|default(10)|int %}
    
    SET_DISPLAY_TEXT MSG="Starting heat soak"
    
    # Home if needed
    _CG28
    
    # Move to center and start heating
    G90
    G1 X175 Y175 Z50 F6000
    M106 S255              # Turn on part fan for circulation
    M140 S{BED_TEMP}       # Start bed heating
    
    SET_DISPLAY_TEXT MSG="Heat soaking: {BED_TEMP}°C for {MINUTES}min"
    M190 S{BED_TEMP}       # Wait for bed
    
    # Soak for specified time
    {% for i in range(MINUTES) %}
        M117 Soaking... {MINUTES - i} minutes left
        G4 P60000          # Wait 1 minute
    {% endfor %}
    
    M107                   # Turn off part fan
    SET_DISPLAY_TEXT MSG="Heat soak complete"

[gcode_macro PREHEAT_PLA]
description: Preheat for PLA
gcode:
    SET_DISPLAY_TEXT MSG="Preheating for PLA"
    LIGHTS_HEATING
    M140 S60              # Bed temp
    M104 S200             # Hotend temp (non-blocking)

[gcode_macro PREHEAT_ABS]
description: Preheat for ABS
gcode:
    SET_DISPLAY_TEXT MSG="Preheating for ABS"
    LIGHTS_HEATING
    M140 S100             # Bed temp
    M104 S240             # Hotend temp (non-blocking)

[gcode_macro PREHEAT_PETG]
description: Preheat for PETG
gcode:
    SET_DISPLAY_TEXT MSG="Preheating for PETG"
    LIGHTS_HEATING
    M140 S75              # Bed temp
    M104 S230             # Hotend temp (non-blocking)

#####################################################################
#   MAINTENANCE & UTILITY MACROS
#####################################################################

[gcode_macro CENTER_TOOLHEAD]
description: Move toolhead to center of bed
gcode:
    _CG28
    LIGHTS_BREATHE
    G90
    G1 X175 Y175 Z100 F6000
    LIGHTS_IDLE

[gcode_macro MOTORS_OFF]
description: Turn off all stepper motors
gcode:
    LIGHTS_DIM
    M84
    G4 P1000
    LIGHTS_IDLE

[gcode_macro BED_MESH_LOAD]
description: Load bed mesh profile
gcode:
    {% set PROFILE = params.PROFILE|default("default") %}
    LIGHTS_BREATHE
    BED_MESH_PROFILE LOAD={PROFILE}
    LIGHTS_IDLE
    SET_DISPLAY_TEXT MSG="Loaded mesh: {PROFILE}"

[gcode_macro PID_TUNE_EXTRUDER]
description: PID tune the extruder
gcode:
    {% set TEMP = params.TEMP|default(200)|int %}
    SET_DISPLAY_TEXT MSG="PID tuning extruder at {TEMP}°C"
    LIGHTS_HEATING
    PID_CALIBRATE HEATER=extruder TARGET={TEMP}
    LIGHTS_IDLE
    SAVE_CONFIG

[gcode_macro PID_TUNE_BED]
description: PID tune the bed
gcode:
    {% set TEMP = params.TEMP|default(60)|int %}
    SET_DISPLAY_TEXT MSG="PID tuning bed at {TEMP}°C"
    LIGHTS_HEATING
    PID_CALIBRATE HEATER=heater_bed TARGET={TEMP}
    LIGHTS_IDLE
    SAVE_CONFIG

#####################################################################
#   TESTING & CALIBRATION MACROS
#####################################################################

[gcode_macro TEST_SPEED_FAST]
description: Quick speed test
gcode:
    SET_DISPLAY_TEXT MSG="Time to see what this baby can do!"
    LIGHTS_ON
    TEST_SPEED SPEED=300 ACCEL=5000
    LIGHTS_IDLE

[gcode_macro TEST_SPEED_MEDIUM]  
description: Medium speed test
gcode:
    SET_DISPLAY_TEXT MSG="Let's see how she handles this!"
    LIGHTS_PRINTING
    TEST_SPEED SPEED=150 ACCEL=3000
    LIGHTS_IDLE

[gcode_macro PRESSURE_ADVANCE_TEST]
description: Quick PA test pattern
gcode:
    {% set PA_START = params.PA_START|default(0.0)|float %}
    {% set PA_STOP = params.PA_STOP|default(0.1)|float %}
    {% set NZL = params.NZL|default(0.4)|float %}
    
    SET_DISPLAY_TEXT MSG="PA Test: {PA_START} to {PA_STOP}"
    # This would need the actual PA test macro or Klipper's built-in PA calibration

[gcode_macro TEST_SPEED]
# Home, get position, throw around toolhead, home again.
# If MCU stepper positions (first line in GET_POSITION) are greater than a full step different (your number of microsteps), then skipping occured.
# We only measure to a full step to accomodate for endstop variance.
# Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10

description: Test for max speed and acceleration parameters for the printer. Procedure: Home -> ReadPositionFromMCU -> MovesToolhead@Vel&Accel -> Home -> ReadPositionfromMCU

gcode:
    # Speed
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Minimum Cruise Ratio
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    # Bounding inset for large pattern (helps prevent slamming the toolhead into the sides after small skips, and helps to account for machines with imperfectly set dimensions)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}
    
    # Large pattern
        # Max positions, inset by BOUND
        {% set x_min = printer.toolhead.axis_minimum.x %}
        {% if x_min < 0 %}
            {% set x_min = 0 %}
        {% endif %}
    
        {% set y_min = printer.toolhead.axis_minimum.y %}
        {% if y_min < 0 %}
            {% set y_min = 0 %}
        {% endif %}
    
        {% set x_min = x_min + bound %}
        {% set x_max = printer.toolhead.axis_maximum.x - bound %}
        {% set y_min = y_min + bound %}
        {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    
    # Small pattern at center
        # Find X/Y center point
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
        
        # Set small pattern box around center point
        {% set x_center_min = x_center - (smallpatternsize/2) %}
        {% set x_center_max = x_center + (smallpatternsize/2) %}
        {% set y_center_min = y_center - (smallpatternsize/2) %}
        {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED
    
    # Output parameters to g-code terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }
    
    # Home and get position for comparison later:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28
        # QGL if not already QGLd (only if QGL section exists in config)
        {% if printer.configfile.settings.quad_gantry_level %}
            {% if printer.quad_gantry_level.applied == False %}
                QUAD_GANTRY_LEVEL
                G28 Z
            {% endif %}
        {% endif %} 
        # Move 50mm away from max position and home again (to help with hall effect endstop accuracy - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/24)
        G90
        G1 X{printer.toolhead.axis_maximum.x-50} Y{printer.toolhead.axis_maximum.y-50} F{30*60}
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 X Y
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Go to starting position
    G0 X{x_min} Y{y_min} Z{bound + 10} F{speed*60}

    # Set new limits
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    {% for i in range(iterations) %}
        # Large pattern diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        
        # Large pattern box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    
        # Small pattern diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        
        # Small pattern box
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/accel_to_decel to their configured values
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio} 
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # Re-home and get position again for comparison:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 # This is a full G28 to fix an issue with CoreXZ - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/12
        # Go to XY home positions (in case your homing override leaves it elsewhere)
        G90
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=TEST_SPEED
    


#####################################################################
#   DIAGNOSTIC MACROS
#####################################################################

[gcode_macro STATUS_REPORT]
description: Cheeky status update with personality
gcode:
    # Check various systems and report with attitude
    {% set bed_temp = printer.heater_bed.temperature %}
    {% set hotend_temp = printer.extruder.temperature %}
    {% set nh36_temp = printer["temperature_sensor NH36"].temperature %}
    {% set carto_temp = printer["temperature_sensor Cartographer_MCU"].temperature %}
    
    {% if bed_temp > 40 %}
        SET_DISPLAY_TEXT MSG="Bed's nice and toasty at {bed_temp|round(1)}°C"
    {% else %}
        SET_DISPLAY_TEXT MSG="Bed's chillin' at {bed_temp|round(1)}°C"
    {% endif %}
    G4 P2000
    
    {% if hotend_temp > 100 %}
        SET_DISPLAY_TEXT MSG="Hotend's fired up at {hotend_temp|round(1)}°C"
    {% else %}
        SET_DISPLAY_TEXT MSG="Hotend's cool as a cucumber at {hotend_temp|round(1)}°C"
    {% endif %}
    G4 P2000
    
    {% if nh36_temp > 45 %}
        SET_DISPLAY_TEXT MSG="Nitehawk's getting a bit warm at {nh36_temp|round(1)}°C"
    {% else %}
        SET_DISPLAY_TEXT MSG="Nitehawk's running sweet at {nh36_temp|round(1)}°C"
    {% endif %}
    G4 P2000
    
    {% if printer.toolhead.homed_axes|length == 3 %}
        SET_DISPLAY_TEXT MSG="All axes homed and ready to rock!"
    {% else %}
        SET_DISPLAY_TEXT MSG="Need a home first, mate!"
    {% endif %}
    G4 P2000
    
    SET_DISPLAY_TEXT MSG="Everything's looking bonzer!"

[gcode_macro HEALTH_CHECK]
description: System diagnostics with personality
gcode:
    SET_DISPLAY_TEXT MSG="Running a full health check"
    
    # Check temperatures
    {% set nh36_temp = printer["temperature_sensor NH36"].temperature %}
    {% set carto_temp = printer["temperature_sensor Cartographer_MCU"].temperature %}
    
    {% if nh36_temp < 50 %}
        SET_DISPLAY_TEXT MSG="Nitehawk's feeling fresh as a daisy"
    {% else %}
        SET_DISPLAY_TEXT MSG="Nitehawk's running a bit warm, keep an eye on it"
    {% endif %}
    G4 P2000
    
    {% if carto_temp < 45 %}
        SET_DISPLAY_TEXT MSG="Cartographer's cool and collected"
    {% else %}
        SET_DISPLAY_TEXT MSG="Cartographer's getting a bit toasty"
    {% endif %}
    G4 P2000
    
    # Check if QGL has been applied
    {% if printer.quad_gantry_level.applied %}
        SET_DISPLAY_TEXT MSG="Gantry's level as a spirit level"
    {% else %}
        SET_DISPLAY_TEXT MSG="Gantry needs a level, mate"
    {% endif %}
    G4 P2000
    
    SET_DISPLAY_TEXT MSG="Overall health: Looking pretty bloody good!"