# daylight_led.cfg - Chamber LED configuration for Voron 2.4 350mm
#
# Single neopixel strip (50 LEDs, GRB) on BTT Octopus V1.1 pin PB0.
# Uses led_effect plugin for animations, direct SET_LED for static states.
#
# States: Idle (dim white) > Heating (red pulse) > First Layer (full white)
#         > Printing (bright white) > Complete (green > idle) > Error (red strobe)

#####################################################################
#   Hardware Definition
#####################################################################
[neopixel daylight]
pin: PB0
chain_count: 50
color_order: GRB
initial_GREEN: 1.0
initial_RED:   1.0
initial_BLUE:  1.0

#####################################################################
#   LED Effects
#####################################################################

[led_effect idle]
leds: neopixel:daylight
layers:
    static 1 0 top (0.5, 0.5, 0.5)
autostart: false
frame_rate: 1

[led_effect heating]
leds: neopixel:daylight
layers:
    breathing 4 0 add (0.0, 0.3, 0.0)
    static    1 0 top (1.0, 0.0, 0.0)
autostart: false
frame_rate: 20

[led_effect cooling]
leds: neopixel:daylight
layers:
    breathing 4 0 add (0.0, 0.3, 0.0)
    static    1 0 top (0.0, 0.0, 1.0)
autostart: false
frame_rate: 20

[led_effect critical_error]
leds: neopixel:daylight
layers:
    strobe      2   0.5   add        (1.0,  1.0, 1.0)
    breathing   2   0     difference (0.95, 0.0, 0.0)
    static      1   0     top        (1.0,  0.0, 0.0)
autostart: false
frame_rate: 24
run_on_error: true

[led_effect breathe_white]
leds: neopixel:daylight
layers:
    breathing 5 0 top (1.0, 1.0, 1.0)
autostart: false
frame_rate: 20

#####################################################################
#   LED Control Macros
#####################################################################

[gcode_macro LIGHTS_IDLE]
description: Soft 50% white (idle mode)
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    SET_LED_EFFECT EFFECT=idle

[gcode_macro LIGHTS_HEATING]
description: Red breathing pulse (warming up)
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    SET_LED_EFFECT EFFECT=heating

[gcode_macro LIGHTS_COOLING]
description: Blue breathing pulse (cooling down)
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    SET_LED_EFFECT EFFECT=cooling

[gcode_macro LIGHTS_ON]
description: Full brightness white
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    SET_LED LED=daylight RED=1.0 GREEN=1.0 BLUE=1.0

[gcode_macro LIGHTS_PRINTING]
description: Bright white for printing (80%)
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    SET_LED LED=daylight RED=0.8 GREEN=0.8 BLUE=0.8

[gcode_macro LIGHTS_OFF]
description: Turn off all chamber lights
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    SET_LED LED=daylight RED=0.0 GREEN=0.0 BLUE=0.0

[gcode_macro LIGHTS_DIM]
description: Dim white (30%)
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    SET_LED LED=daylight RED=0.3 GREEN=0.3 BLUE=0.3

[gcode_macro LIGHTS_BREATHE]
description: Slow pulsing white
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    SET_LED_EFFECT EFFECT=breathe_white

[gcode_macro LIGHTS_COMPLETE]
description: Green completion flash, then back to idle after 30s
gcode:
    STOP_LED_EFFECTS LEDS=neopixel:daylight
    UPDATE_DELAYED_GCODE ID=_LIGHTS_LAYER_CHECK DURATION=0
    {% for i in range(3) %}
        SET_LED LED=daylight RED=1.0 GREEN=1.0 BLUE=1.0
        G4 P300
        SET_LED LED=daylight RED=0.0 GREEN=1.0 BLUE=0.0
        G4 P300
    {% endfor %}
    SET_LED LED=daylight RED=0.0 GREEN=1.0 BLUE=0.0
    UPDATE_DELAYED_GCODE ID=_LIGHTS_COMPLETE_TIMEOUT DURATION=30

[delayed_gcode _LIGHTS_COMPLETE_TIMEOUT]
initial_duration: 0
gcode:
    LIGHTS_IDLE

#####################################################################
#   Print Layer Monitor - dims from full white to 80% after layer 1
#####################################################################

[delayed_gcode _LIGHTS_LAYER_CHECK]
initial_duration: 0
gcode:
    {% if printer.print_stats.state == "printing" %}
        {% set current_layer = printer.print_stats.info.current_layer|default(0)|int %}
        {% if current_layer > 1 %}
            LIGHTS_PRINTING
        {% else %}
            UPDATE_DELAYED_GCODE ID=_LIGHTS_LAYER_CHECK DURATION=15
        {% endif %}
    {% endif %}

[gcode_macro _LIGHTS_START_LAYER_MONITOR]
description: Start monitoring layer count to dim after first layer
gcode:
    UPDATE_DELAYED_GCODE ID=_LIGHTS_LAYER_CHECK DURATION=15
