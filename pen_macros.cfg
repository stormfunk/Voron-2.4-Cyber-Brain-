# Pen-plotter macros for the Grasshopper -> Voron pen-plot pipeline.

[save_variables]
filename: ~/printer_data/config/saved_variables.cfg

[gcode_macro PEN_PAUSE]
description: Lift, go to load point, drop to pen height, pause without parking (for pen insertion)
gcode:
    {% set z = params.Z|default(2.0)|float %}
    {% set x = params.X|default(175)|float %}
    {% set y = params.Y|default(40)|float %}
    {% set lift = params.LIFT|default(20)|float %}
    {% set pen = params.PEN|default(0)|int %}
    {% set color = params.COLOR|default('')|string %}
    G90
    G1 Z{z + lift} F3000
    G1 X{x} Y{y} F9000
    G1 Z{z} F1000
    M400
    {% if pen > 0 %}
    SET_DISPLAY_TEXT MSG="Load PEN {pen} [{color}], seat to surface, then PEN_RESUME"
    {% else %}
    SET_DISPLAY_TEXT MSG="Insert pen to surface, then run PEN_RESUME"
    {% endif %}
    PAUSE_BASE

[gcode_macro PEN_RESUME]
description: Resume after PEN_PAUSE - no un-retract, no parking
gcode:
    SET_DISPLAY_TEXT MSG="Plotting..."
    RESUME_BASE

[gcode_macro PEN_RESTORE_LIMITS]
description: Restore accel / square corner velocity to printer.cfg defaults after a plot
gcode:
    {% set cfg = printer.configfile.settings.printer %}
    SET_VELOCITY_LIMIT ACCEL={cfg.max_accel} SQUARE_CORNER_VELOCITY={cfg.square_corner_velocity|default(5)}

# ---- Paper registration: jog pen tip to a corner, press the matching button ----

[gcode_macro PAPER_SET_FL]
description: Save current pen position as paper FRONT-LEFT corner (P0)
gcode:
    {% set p = printer.gcode_move.gcode_position %}
    SAVE_VARIABLE VARIABLE=paper_p0 VALUE="{[p.x|round(3), p.y|round(3)]}"
    SET_DISPLAY_TEXT MSG="Paper FL (P0) saved: {p.x|round(1)}, {p.y|round(1)}"

[gcode_macro PAPER_SET_FR]
description: Save current pen position as paper FRONT-RIGHT corner (P1)
gcode:
    {% set p = printer.gcode_move.gcode_position %}
    SAVE_VARIABLE VARIABLE=paper_p1 VALUE="{[p.x|round(3), p.y|round(3)]}"
    SET_DISPLAY_TEXT MSG="Paper FR (P1) saved: {p.x|round(1)}, {p.y|round(1)}"

[gcode_macro PAPER_SET_BL]
description: Save current pen position as paper BACK-LEFT corner (P2)
gcode:
    {% set p = printer.gcode_move.gcode_position %}
    SAVE_VARIABLE VARIABLE=paper_p2 VALUE="{[p.x|round(3), p.y|round(3)]}"
    SET_DISPLAY_TEXT MSG="Paper BL (P2) saved: {p.x|round(1)}, {p.y|round(1)}"

[gcode_macro PLOT_HOME_QGL]
description: Conditional homing + QGL for pen plots - skips whatever is already valid
gcode:
    {% set do_qgl = params.QGL|default(1)|int %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
    SET_DISPLAY_TEXT MSG="Homing..."
    G28
    {% else %}
    RESPOND TYPE=echo MSG="PLOT: already homed, skipping G28"
    {% endif %}
    {% if do_qgl %}
    {% if not printer.quad_gantry_level.applied %}
    SET_DISPLAY_TEXT MSG="Quad gantry leveling..."
    QUAD_GANTRY_LEVEL
    G28 Z
    {% else %}
    RESPOND TYPE=echo MSG="PLOT: QGL already applied, skipping"
    {% endif %}
    {% endif %}